<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>GOLDEN VOXEL FPS</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07090f;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;user-select:none}#app{position:fixed;inset:0;overflow:hidden}#view{position:absolute;inset:0}.hud{position:absolute;z-index:10;left:12px;right:12px;top:max(12px,env(safe-area-inset-top));display:flex;justify-content:space-between;gap:10px;pointer-events:none}.box{background:rgba(5,7,12,.62);border:1px solid rgba(255,212,71,.38);border-radius:16px;padding:10px 12px;backdrop-filter:blur(10px);box-shadow:0 14px 50px rgba(0,0,0,.35),inset 0 0 0 1px rgba(255,255,255,.05)}h1{margin:0;color:#ffd447;font-size:20px;line-height:1;text-shadow:0 2px 0 #6b3300,0 0 18px rgba(255,212,71,.45)}.sub{margin-top:5px;color:#cdbb8c;font-size:12px}.stat{font-size:12px;line-height:1.6;text-align:right;color:#fff4d0}.gold{color:#ffd447;font-weight:900}#cross{position:absolute;z-index:9;left:50%;top:50%;width:28px;height:28px;transform:translate(-50%,-50%);pointer-events:none}#cross:before,#cross:after{content:"";position:absolute;background:rgba(255,255,255,.9);box-shadow:0 0 7px #000}#cross:before{left:13px;top:4px;width:2px;height:20px}#cross:after{left:4px;top:13px;width:20px;height:2px}.controls{position:absolute;z-index:12;left:12px;right:12px;bottom:max(12px,env(safe-area-inset-bottom));display:flex;align-items:end;justify-content:space-between;gap:10px;pointer-events:none}.pad{width:152px;height:152px;position:relative;pointer-events:auto}.pad button{position:absolute;width:48px;height:48px;padding:0}.up{left:52px;top:0}.down{left:52px;bottom:0}.left{left:0;top:52px}.right{right:0;top:52px}.actions{display:flex;gap:10px;align-items:center;justify-content:end;flex-wrap:wrap;pointer-events:auto}button{appearance:none;border:0;border-radius:999px;min-height:48px;padding:0 18px;background:linear-gradient(180deg,#fff37e,#ffb21f);color:#2b1300;font-weight:950;font-size:14px;box-shadow:0 6px 0 #8b3c00,0 14px 26px rgba(0,0,0,.3)}button:active{transform:translateY(4px);box-shadow:0 2px 0 #8b3c00,0 8px 16px rgba(0,0,0,.25)}button.alt{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.22);box-shadow:none}.chip{display:flex;align-items:center;gap:8px;min-height:46px;border-radius:999px;background:rgba(5,7,12,.62);border:1px solid rgba(255,255,255,.18);padding:0 13px;font-size:13px}.sw{width:18px;height:18px;border-radius:5px;border:2px solid rgba(255,255,255,.8)}#start{position:absolute;z-index:30;inset:0;display:flex;align-items:center;justify-content:center;padding:18px;background:radial-gradient(circle at 50% 30%,rgba(255,212,71,.18),rgba(5,6,10,.9) 58%,rgba(5,6,10,.98))}.card{width:min(430px,94vw);padding:24px 20px;text-align:center;border-radius:24px;background:linear-gradient(180deg,rgba(27,26,32,.94),rgba(7,8,13,.96));border:1px solid rgba(255,212,71,.45);box-shadow:0 24px 80px rgba(0,0,0,.45),inset 0 0 0 1px rgba(255,255,255,.06)}.title{font-size:clamp(42px,13vw,64px);line-height:.92;font-weight:1000;color:#ffd447;letter-spacing:-.07em;text-shadow:0 4px 0 #6b3300,0 0 28px rgba(255,212,71,.45)}.lead{margin:14px auto 0;max-width:340px;color:#cdbb8c;font-size:14px;line-height:1.7}.hidden{display:none!important}@media(max-width:560px){.hud{display:block}.stat{margin-top:8px;text-align:left}.controls{align-items:end}.actions{max-width:190px}.pad{width:132px;height:132px}.pad button{width:42px;height:42px}.up{left:45px}.down{left:45px}.left{top:45px}.right{top:45px}button{min-height:44px;padding:0 14px}}
</style>
</head>
<body>
<div id="app">
  <div id="view"></div>
  <div id="cross"></div>
  <div class="hud"><div class="box"><h1>GOLDEN VOXEL FPS</h1><div class="sub">一人称マイクラ風プロトタイプ</div></div><div class="box stat">BLOCKS <span class="gold" id="count">0</span><br>ENEMIES <span class="gold" id="enemyCount">0</span><br>LOOK <span class="gold" id="look">NONE</span></div></div>
  <div class="controls">
    <div class="pad"><button class="up" data-m="f">▲</button><button class="down" data-m="b">▼</button><button class="left" data-m="l">◀</button><button class="right" data-m="r">▶</button></div>
    <div class="actions"><button id="shootBtn">SHOOT</button><button id="breakBtn">BREAK</button><button id="placeBtn">PLACE</button><button class="alt" id="resetBtn">RESET</button><div class="chip" id="typeBtn"><span class="sw" id="sw"></span><span id="typeName">GOLD</span></div></div>
  </div>
  <div id="start"><div class="card"><div class="title">GOLDEN<br>VOXEL</div><p class="lead">ドラッグで視点操作。<br>中央の十字でブロックを狙って、BREAKで壊す、PLACEで置く。<br>PCはWASD/矢印キーでも移動できます。</p><div style="margin-top:22px"><button id="startBtn">START</button></div></div></div>
</div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
const view=document.getElementById('view'),start=document.getElementById('start'),startBtn=document.getElementById('startBtn'),countEl=document.getElementById('count'),enemyCountEl=document.getElementById('enemyCount'),lookEl=document.getElementById('look'),shootBtn=document.getElementById('shootBtn'),breakBtn=document.getElementById('breakBtn'),placeBtn=document.getElementById('placeBtn'),resetBtn=document.getElementById('resetBtn'),typeBtn=document.getElementById('typeBtn'),typeName=document.getElementById('typeName'),sw=document.getElementById('sw');
const scene=new THREE.Scene();scene.background=new THREE.Color(0x86c8ff);scene.fog=new THREE.Fog(0x86c8ff,22,60);
const camera=new THREE.PerspectiveCamera(72,innerWidth/innerHeight,.05,100);
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});renderer.setPixelRatio(Math.min(devicePixelRatio,1.6));renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;view.appendChild(renderer.domElement);
scene.add(new THREE.HemisphereLight(0xdff0ff,0x3a2817,2.2));const sun=new THREE.DirectionalLight(0xfff0bd,2.4);sun.position.set(12,22,10);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);sun.shadow.camera.left=-28;sun.shadow.camera.right=28;sun.shadow.camera.top=28;sun.shadow.camera.bottom=-28;scene.add(sun);
const geo=new THREE.BoxGeometry(1,1,1),edgeGeo=new THREE.EdgesGeometry(geo);const mats={grass:new THREE.MeshStandardMaterial({color:0x50b84d,roughness:.9}),dirt:new THREE.MeshStandardMaterial({color:0x8a5730,roughness:.95}),stone:new THREE.MeshStandardMaterial({color:0x777d86,roughness:.88}),gold:new THREE.MeshStandardMaterial({color:0xffca27,roughness:.42,metalness:.38,emissive:0x332000,emissiveIntensity:.24}),water:new THREE.MeshStandardMaterial({color:0x2487ff,transparent:true,opacity:.66,roughness:.16})};
const edgeMat=new THREE.LineBasicMaterial({color:0x000000,transparent:true,opacity:.16}),selMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.28,depthWrite:false});
const group=new THREE.Group();scene.add(group);const blocks=new Map();const selector=new THREE.Mesh(new THREE.BoxGeometry(1.06,1.06,1.06),selMat);selector.visible=false;scene.add(selector);
const ray=new THREE.Raycaster();ray.far=7;let hit=null;let blockType='gold',palette=['gold','grass','stone','dirt','water'],pi=0;
const enemyGeo=new THREE.BoxGeometry(.7,1.3,.7),enemyMat=new THREE.MeshStandardMaterial({color:0xff5858,roughness:.65,metalness:.1,emissive:0x2a0000}),enemyGroup=new THREE.Group();scene.add(enemyGroup);const enemies=[];
function k(x,y,z){return x+','+y+','+z}function h(x,z){return Math.max(0,Math.floor(1.4+Math.sin(x*.55)*1.1+Math.cos(z*.65)*1.1+Math.sin((x-z)*.28)))}
function setType(t){blockType=t;typeName.textContent=t.toUpperCase();sw.style.background=mats[t].color.getStyle()}setType(blockType);
function addBlock(x,y,z,type='grass'){const key=k(x,y,z);if(blocks.has(key))return;const m=new THREE.Mesh(geo,mats[type]);m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;m.userData={x,y,z,type};const e=new THREE.LineSegments(edgeGeo,edgeMat);e.position.copy(m.position);e.userData.edge=true;group.add(m,e);blocks.set(key,{m,e,type})}
function delBlock(key){const b=blocks.get(key);if(!b)return;group.remove(b.m,b.e);blocks.delete(key);selector.visible=false;hit=null;updateCount()}
function updateCount(){countEl.textContent=blocks.size}
function updateEnemyCount(){enemyCountEl.textContent=enemies.length}
function spawnEnemy(x,z){const y=groundY(x,z)-.15;const m=new THREE.Mesh(enemyGeo,enemyMat);m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;m.userData={enemy:true,hp:1,phase:Math.random()*Math.PI*2};enemyGroup.add(m);enemies.push(m)}
function clearEnemies(){for(const e of enemies)enemyGroup.remove(e);enemies.length=0;updateEnemyCount()}
function reset(){for(const b of blocks.values())group.remove(b.m,b.e);blocks.clear();clearEnemies();for(let x=-12;x<=12;x++)for(let z=-12;z<=12;z++){let top=h(x,z);for(let y=-2;y<=top;y++){let t=y===top?'grass':y<top-1?'stone':'dirt';if(y===top&&((x===2&&z===2)||(x===-4&&z===3)||(x===5&&z===-5)))t='gold';if(y===top&&x<-6&&z>5)t='water';addBlock(x,y,z,t)}}for(let i=0;i<7;i++)spawnEnemy((Math.random()*20-10)|0,(Math.random()*20-10)|0);updateCount();updateEnemyCount()}reset();
let pos=new THREE.Vector3(0,4,8),yaw=Math.PI,pitch=-.22,velY=0;const keys={f:0,b:0,l:0,r:0};
function groundY(x,z){let gx=Math.round(x),gz=Math.round(z),max=-3;for(const key of blocks.keys()){const a=key.split(',').map(Number);if(a[0]===gx&&a[2]===gz&&a[1]>max)max=a[1]}return max+1.8}
function updateCam(){pitch=Math.max(-1.25,Math.min(1.05,pitch));camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;camera.position.copy(pos)}updateCam();
let down=false,lastX=0,lastY=0;renderer.domElement.addEventListener('pointerdown',e=>{down=true;lastX=e.clientX;lastY=e.clientY;renderer.domElement.setPointerCapture(e.pointerId)});renderer.domElement.addEventListener('pointermove',e=>{if(!down)return;const dx=e.clientX-lastX,dy=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;yaw-=dx*.0045;pitch-=dy*.0045;updateCam()});renderer.domElement.addEventListener('pointerup',()=>down=false);
addEventListener('keydown',e=>{if(e.key==='w'||e.key==='ArrowUp')keys.f=1;if(e.key==='s'||e.key==='ArrowDown')keys.b=1;if(e.key==='a'||e.key==='ArrowLeft')keys.l=1;if(e.key==='d'||e.key==='ArrowRight')keys.r=1;if(e.key===' ')shoot()});addEventListener('keyup',e=>{if(e.key==='w'||e.key==='ArrowUp')keys.f=0;if(e.key==='s'||e.key==='ArrowDown')keys.b=0;if(e.key==='a'||e.key==='ArrowLeft')keys.l=0;if(e.key==='d'||e.key==='ArrowRight')keys.r=0});
document.querySelectorAll('[data-m]').forEach(btn=>{const m=btn.dataset.m;const on=e=>{e.preventDefault();keys[m]=1};const off=e=>{e.preventDefault();keys[m]=0};btn.addEventListener('pointerdown',on);btn.addEventListener('pointerup',off);btn.addEventListener('pointercancel',off);btn.addEventListener('pointerleave',off)});
function scan(){ray.setFromCamera(new THREE.Vector2(0,0),camera);const arr=ray.intersectObjects(group.children,false).filter(x=>!x.object.userData.edge);if(!arr.length){hit=null;selector.visible=false;lookEl.textContent='NONE';return}const it=arr[0],u=it.object.userData,n=it.face.normal.clone().transformDirection(it.object.matrixWorld).round();hit={key:k(u.x,u.y,u.z),x:u.x,y:u.y,z:u.z,type:u.type,n};selector.position.set(u.x,u.y,u.z);selector.visible=true;lookEl.textContent=u.type.toUpperCase()}
function shoot(){ray.setFromCamera(new THREE.Vector2(0,0),camera);const hs=ray.intersectObjects(enemyGroup.children,false);if(!hs.length)return;const enemy=hs[0].object;enemyGroup.remove(enemy);const idx=enemies.indexOf(enemy);if(idx>=0)enemies.splice(idx,1);updateEnemyCount()}
breakBtn.onclick=()=>{if(hit)delBlock(hit.key)};placeBtn.onclick=()=>{if(!hit)return;addBlock(hit.x+hit.n.x,hit.y+hit.n.y,hit.z+hit.n.z,blockType);updateCount()};resetBtn.onclick=reset;typeBtn.onclick=()=>{pi=(pi+1)%palette.length;setType(palette[pi])};startBtn.onclick=()=>start.classList.add('hidden');
shootBtn.onclick=shoot;
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,1.6))});
let last=performance.now();function loop(now){let dt=Math.min((now-last)/1000,.05);last=now;let f=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw)),r=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));let mx=(keys.r-keys.l),mz=(keys.b-keys.f);let move=new THREE.Vector3().addScaledVector(f,mz).addScaledVector(r,mx);if(move.lengthSq()>0)move.normalize().multiplyScalar(5.2*dt),pos.add(move);let gy=groundY(pos.x,pos.z);pos.y+=(gy-pos.y)*Math.min(1,dt*10);for(const e of enemies){const d=new THREE.Vector3(pos.x-e.position.x,0,pos.z-e.position.z);if(d.lengthSq()>0.04){d.normalize().multiplyScalar(1.1*dt);e.position.x+=d.x;e.position.z+=d.z}e.position.y=groundY(e.position.x,e.position.z)-.15;e.rotation.y=Math.atan2(pos.x-e.position.x,pos.z-e.position.z);e.position.y+=Math.sin(now*.004+e.userData.phase)*.06}updateCam();scan();renderer.render(scene,camera);requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script>
</body>
</html>
